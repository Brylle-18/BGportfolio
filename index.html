<!-- // Design ideas 
// 1. Make the nav bar a dynamic island similar to iphones. 
    when the user scrolls down the dynamic island compress and 
    shows only the logo and date, time. when the user hovers
    over the dynamic island it expands and shows the nav bars.

    2. when the user hovers over any button like components 
    the button then will have an animation of extending to its 
    right or left then pushes towards the edge of it that makes
    it look like a bow and arrow. -->

    
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brylle Garcia | Portfolio</title>
  <link href="styles.css" rel="stylesheet">
</head>
<body>

  <div id="fallingWordsContainer"></div>

  <nav class="nav-bar" id="dynamicNav">
    <div class="nav-container">
      <a class="brand-container" href="#">
        <img src="bg.png" alt="logo" class="brand-logo">
        <span class="brand-name">Brylle Garcia</span>
      </a>

      <div class="island-info" id="time-display"></div>

      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#certifications">Certifications</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><a href="#resume" class="resume-btn">Resume</a></li>
      </ul>
    </div>
  </nav>

  <main class="main-content">
    <section id="about" class="about-section">
      <div class="about-grid">
        <div class="about-name">
          <p class="section-label">About</p>
          <h2><span class="letter">B</span><span class="letter">r</span><span class="letter">y</span><span class="letter">l</span><span class="letter">l</span><span class="letter">e</span><span class="letter space">&nbsp;</span><span class="letter">G</span><span class="letter">a</span><span class="letter">r</span><span class="letter">c</span><span class="letter">i</span><span class="letter">a</span></h2>
          <p>Hi, I’m Brylle — an aspiring software developer and cybersecurity enthusiast with a passion to enter and contribute to the tech industry.</p>
        </div>
        <div class="about-image">
          <img src="portprof.jpg" alt="Brylle Garcia" />
        </div>
      </div>
    </section>
  </main>   

  <script src="script.js"></script>
</body>
</html>
